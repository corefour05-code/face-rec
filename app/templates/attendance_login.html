{% extends "base_auth.html" %}
{% block title %}Attendance Portal{% endblock %}
{% block content %}
<h2>Attendance Portal</h2>
<div class="subtitle">Enter the lab passcode to launch the camera</div>
<form method="post" action="/attendance_login">
  <input type="password" name="passcode" class="form-control" placeholder="Lab Passcode" required />
  <div class="hint">Hint: attendance123</div>
  <button type="submit" class="btn btn-primary btn-block">Launch Recognition</button>
</form>
<a class="back-link" href="/welcome">&larr; Back to Home</a>
{% endblock %}
