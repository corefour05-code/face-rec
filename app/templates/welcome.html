{% extends "base_auth.html" %}
{% block title %}Lab Attendance System{% endblock %}
{% block extra_head %}
<style>
  .glass-card { max-width: 500px; padding: 3rem; }
  .gradient-title {
    font-size: 2.5rem;
    font-weight: 700;
    margin: 0 0 0.5rem;
    background: linear-gradient(90deg, #ffffff, #94a3b8);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  .portal-buttons { display: flex; flex-direction: column; gap: 0.9rem; margin-top: 2rem; }
</style>
{% endblock %}
{% block content %}
<h1 class="gradient-title">Lab Attendance System</h1>
<div class="subtitle">Powered by Face Recognition</div>
<div class="portal-buttons">
  <a class="btn btn-primary btn-block" href="/attendance_login">Access Attendance Camera</a>
  <a class="btn btn-outline btn-block" href="/admin_login">Admin Dashboard</a>
</div>
{% endblock %}
