{% extends "base_admin.html" %}
{% block title %}Create New Laboratory{% endblock %}
{% block content %}
<div style="max-width:600px; margin: 0 auto;">
  <h1>Create New Laboratory</h1>
  <p style="color: var(--text-muted);">Define a new lab and assign an administrator.</p>
  <div class="card">
    <form method="post" action="/labs/create">
      <label>Laboratory Name
        <input type="text" name="name" class="form-control" placeholder="e.g. Bot Lab, AI Lab" required />
      </label>
      <label>Lab Admin Username
        <input type="text" name="admin_username" class="form-control" required />
      </label>
      <label>Lab Admin Password
        <input type="password" name="admin_password" class="form-control" required />
      </label>
      <label>Clear Lab Password
        <input type="text" name="clear_password" class="form-control" value="{{ default_clear_password }}" />
      </label>
      <div class="hint" style="margin-bottom:1rem;">Password required to clear attendance manually in this lab.</div>
      <div style="display:flex; gap:1rem;">
        <button type="submit" class="btn btn-primary" style="flex:1;">Create Laboratory</button>
        <a class="btn btn-grey" href="/labs">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
